/* ─── BINGO HELPER ────────────────────────────────────────────────────── */
const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function hasBingo(done, uitd) {
  return LINES.some(l => l.every(i => uitd[i] && done.includes(uitd[i].id)));
}
function getBingoLines(done, uitd) {
  return LINES.filter(l => l.every(i => uitd[i] && done.includes(uitd[i].id)));
}

/* ─── BOOK SPINE ──────────────────────────────────────────────────────── */
const SPINE_WIDTHS = [24,28,32,26,34,28,30,26,32,28,24,36];
function BookSpine({ book, onClick }) {
  const [hov, setHov] = useState(false);
  const [bg, fg] = SC[book.color % SC.length];
  const h = book.height || 150;
  const w = SPINE_WIDTHS[book.id % SPINE_WIDTHS.length] || 28;
  const tilt = [0,0,0.4,-0.3,0,0.2,-0.4,0,0.3,0,-0.2,0][book.id % 12];
  return (
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      title={`${book.title}\n${book.author}`}
      style={{ width:w, height:h, flexShrink:0, cursor:"pointer", position:"relative",
        transform: hov ? "translateY(-16px) scale(1.06)" : `translateY(0) rotate(${tilt}deg)`,
        transformOrigin:"bottom center",
        transition:"transform .22s cubic-bezier(.22,.68,0,1.2)", zIndex:hov?10:1,
      }}>
      {/* Spine body */}
      <div style={{ position:"absolute", inset:0, borderRadius:"3px 3px 1px 1px",
        background:`linear-gradient(to right, rgba(0,0,0,.18) 0%, ${bg}f8 6%, ${bg} 30%, ${bg}ee 70%, ${bg}cc 88%, rgba(0,0,0,.22) 100%)`,
        boxShadow: hov
          ? `0 20px 40px rgba(0,0,0,.6), 0 6px 12px rgba(0,0,0,.4), inset 2px 0 rgba(255,255,255,.2)`
          : `inset 2px 0 rgba(255,255,255,.1), inset -2px 0 rgba(0,0,0,.28), 1px 4px 8px rgba(0,0,0,.35)`,
      }}/>
      <div style={{position:"absolute",top:6,left:3,right:3,height:2.5,background:`${fg}80`,borderRadius:1}}/>
      <div style={{position:"absolute",top:10,left:3,right:3,height:1,background:`${fg}40`,borderRadius:1}}/>
      <div style={{ position:"absolute",top:18,bottom:18,left:0,right:0,display:"flex",alignItems:"center",justifyContent:"center" }}>
        <div style={{ writingMode:"vertical-rl", transform:"rotate(180deg)",
          fontSize:w>30?9:8, fontFamily:"'Lato',sans-serif", fontWeight:700,
          color:fg, letterSpacing:".6px", lineHeight:1.15,
          maxHeight:h-40, overflow:"hidden", userSelect:"none",
          textShadow:"0 1px 3px rgba(0,0,0,.5)", padding:"2px 0",
        }}>{book.title}</div>
      </div>
      <div style={{position:"absolute",bottom:6,left:3,right:3,height:2.5,background:`${fg}80`,borderRadius:1}}/>
      <div style={{position:"absolute",bottom:10,left:3,right:3,height:1,background:`${fg}40`,borderRadius:1}}/>
    </div>
  );
}

/* ─── BOOKSHELF ───────────────────────────────────────────────────────── */
function Bookshelf({ books, onBookClick, label, empty, th }) {
  const PER = 8; // books per row
  const rows = [];
  for (let i = 0; i < Math.max(Math.ceil(books.length / PER), 1); i++)
    rows.push(books.slice(i * PER, (i + 1) * PER));

  // Wood grain lines at random-ish offsets
  const grainLines = [6, 18, 34, 52, 67, 81, 91];

  return (
    <div style={{ marginBottom: 36 }}>
      {/* Section label */}
      <div style={{ fontFamily:"'Lato',sans-serif", fontSize:11, fontWeight:700, letterSpacing:3, textTransform:"uppercase", color:th.rust, marginBottom:12, paddingLeft:4 }}>
        {label}
      </div>

      {/* Full cabinet wrapper — dark walnut outer frame */}
      <div style={{
        position: "relative",
        background: "linear-gradient(180deg, #1c0e07 0%, #140b05 100%)",
        borderRadius: 10,
        boxShadow: "0 16px 48px rgba(0,0,0,.6), 0 4px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,200,100,.07)",
        border: "1px solid rgba(255,180,80,.06)",
        overflow: "hidden",
        padding: "0 20px", // room for side panels
      }}>

        {/* LEFT side panel */}
        <div style={{
          position: "absolute", left: 0, top: 0, bottom: 0, width: 20,
          background: "linear-gradient(to right, #1c0e07 0%, #2e1608 40%, #3a1e0c 60%, #251005 100%)",
          boxShadow: "inset -3px 0 6px rgba(0,0,0,.4), inset 2px 0 rgba(255,200,100,.04)",
          zIndex: 5,
        }}>
          {grainLines.map(p => <div key={p} style={{ position:"absolute", top:`${p}%`, left:2, right:2, height:1, background:"rgba(0,0,0,.2)", borderRadius:2 }}/>)}
        </div>

        {/* RIGHT side panel */}
        <div style={{
          position: "absolute", right: 0, top: 0, bottom: 0, width: 20,
          background: "linear-gradient(to left, #1c0e07 0%, #2e1608 40%, #3a1e0c 60%, #251005 100%)",
          boxShadow: "inset 3px 0 6px rgba(0,0,0,.4), inset -2px 0 rgba(255,200,100,.04)",
          zIndex: 5,
        }}>
          {grainLines.map(p => <div key={p} style={{ position:"absolute", top:`${p}%`, left:2, right:2, height:1, background:"rgba(0,0,0,.2)", borderRadius:2 }}/>)}
        </div>

        {/* TOP crown molding */}
        <div style={{
          height: 16,
          background: "linear-gradient(180deg, #3a2010 0%, #2a1408 50%, #1c0e07 100%)",
          boxShadow: "inset 0 -2px 4px rgba(0,0,0,.3)",
          position: "relative", overflow:"hidden",
          marginLeft: -20, marginRight: -20,
        }}>
          {[10,28,46,64,82].map(p => <div key={p} style={{ position:"absolute", top:5, left:`${p}%`, width:60, height:1.5, background:"rgba(255,200,100,.06)", transform:"rotate(-1deg)", borderRadius:2 }}/>)}
          <div style={{ position:"absolute", bottom:0, left:0, right:0, height:2, background:"rgba(0,0,0,.4)" }}/>
        </div>

        {/* ROWS of books + shelves */}
        {rows.map((row, ri) => (
          <div key={ri}>
            {/* Back wall of this shelf bay */}
            <div style={{
              minHeight: 200,
              background: "radial-gradient(ellipse at 50% 100%, #0e0704 0%, #080402 100%)",
              padding: "14px 6px 0",
              display: "flex",
              alignItems: "flex-end",
              gap: 4,
              position: "relative",
              overflow: "visible",
            }}>
              {/* Subtle back-wall vertical grain */}
              {[12,28,45,62,78,93].map(p => (
                <div key={p} style={{ position:"absolute", top:0, bottom:0, left:`${p}%`, width:1, background:"rgba(255,140,40,.012)" }}/>
              ))}
              {/* Ambient light from above hitting book tops */}
              <div style={{ position:"absolute", top:0, left:0, right:0, height:30, background:"linear-gradient(180deg,rgba(255,200,100,.04),transparent)", pointerEvents:"none" }}/>

              {row.length === 0 ? (
                <div style={{ color:"rgba(255,255,255,.13)", fontFamily:"'Lato',sans-serif", fontSize:12, paddingBottom:22, paddingLeft:6, fontStyle:"italic" }}>{empty}</div>
              ) : (
                <>
                  {row.map(b => <BookSpine key={b.id} book={b} onClick={() => onBookClick(b)} />)}
                  {/* Bookend when row not full */}
                  {row.length < PER && (
                    <div style={{ width:14, height:120, marginLeft:4, flexShrink:0, alignSelf:"flex-end",
                      background:"linear-gradient(to right, #9B8060, #7B6040 40%, #5B4020 80%, #4B3010)",
                      borderRadius:"2px 2px 0 0",
                      boxShadow:"-3px 0 8px rgba(0,0,0,.5), inset 1px 0 rgba(255,200,100,.1)",
                    }}/>
                  )}
                </>
              )}
            </div>

            {/* THE SHELF — rich layered wood */}
            <div style={{
              height: 24,
              position: "relative", overflow:"hidden",
              marginLeft: -6, marginRight: -6,
              background: "linear-gradient(180deg, #9B6030 0%, #7B4C22 12%, #6B3C18 30%, #5B3010 65%, #3D1E08 100%)",
              boxShadow: "0 6px 18px rgba(0,0,0,.6), inset 0 2px 0 rgba(255,220,140,.18), inset 0 -1px 0 rgba(0,0,0,.4)",
            }}>
              {/* Wood grain */}
              {[5,18,33,48,60,73,86].map(p => (
                <div key={p} style={{ position:"absolute", top:3, left:`${p}%`, width:65, height:1.5, background:"rgba(0,0,0,.16)", transform:"rotate(-.8deg)", borderRadius:4 }}/>
              ))}
              {[12,38,58,80].map(p => (
                <div key={p} style={{ position:"absolute", top:8, left:`${p}%`, width:40, height:1, background:"rgba(0,0,0,.1)", transform:"rotate(.5deg)", borderRadius:4 }}/>
              ))}
              {/* Top highlight */}
              <div style={{ position:"absolute", top:0, left:0, right:0, height:4, background:"linear-gradient(180deg,rgba(255,220,140,.22),transparent)" }}/>
              {/* Edge shadow (books sit on shelf) */}
              <div style={{ position:"absolute", top:0, left:0, right:0, height:6, background:"linear-gradient(180deg,rgba(0,0,0,.35),transparent)" }}/>
            </div>
          </div>
        ))}

        {/* BOTTOM base */}
        <div style={{
          height: 14,
          marginLeft: -20, marginRight: -20,
          background: "linear-gradient(180deg, #4a2a10 0%, #3a1e08 40%, #2a1205 100%)",
          boxShadow: "inset 0 2px 4px rgba(0,0,0,.4)",
          position:"relative", overflow:"hidden",
        }}>
          {[15,35,55,75].map(p => <div key={p} style={{ position:"absolute", top:4, left:`${p}%`, width:50, height:1, background:"rgba(0,0,0,.2)", borderRadius:2 }}/>)}
        </div>
      </div>
    </div>
  );
}

/* ─── BOOK MODAL ──────────────────────────────────────────────────────── */
function BookModal({ book, onClose, onUpdate, onDelete, th }) {
  const [edit,   setEdit]   = useState(false);
  const [review, setReview] = useState(book.review||"");
  const [quote,  setQuote]  = useState(book.quote||"");
  const [pr,     setPr]     = useState(String(book.read||0));
  const [rating, setRating] = useState(book.rating||0);
  const [title,  setTitle]  = useState(book.title);
  const [author, setAuthor] = useState(book.author);
  const [genre,  setGenre]  = useState(book.genre);
  const [pages,  setPages]  = useState(String(book.pages));
  const [year,   setYear]   = useState(String(book.year||""));
  const [confirm,setConfirm]= useState(false);
  const [bg] = SC[book.color%SC.length];
  const pct = book.pages ? Math.min(100,Math.round(((parseInt(pr)||0)/book.pages)*100)) : 0;
  const inp = {width:"100%",padding:"8px 12px",border:`1px solid ${th.bord}`,borderRadius:8,fontFamily:"'Lato',sans-serif",fontSize:14,background:th.bg,color:th.text,outline:"none",boxSizing:"border-box"};

  const save = () => {
    const read = parseInt(pr)||0;
    onUpdate({...book, review, quote, read, rating, title, author, genre, pages:parseInt(pages)||book.pages, year:parseInt(year)||book.year,
      status: (read>=book.pages&&book.status==="lezen")?"gelezen":book.status });
    onClose();
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,10,4,.82)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(5px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:`linear-gradient(150deg,${th.paper},${th.warm})`,borderRadius:20,maxWidth:480,width:"100%",maxHeight:"88vh",overflowY:"auto",boxShadow:`0 36px 90px rgba(0,0,0,.65),0 0 0 1px ${th.bord}`}}>
        <div style={{height:7,background:bg,borderRadius:"20px 20px 0 0"}}/>
        <div style={{padding:24}}>
          {/* Header row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
            <div style={{display:"flex",gap:14,flex:1}}>
              <div style={{width:44,height:62,background:`linear-gradient(to right,${bg}f0,${bg})`,borderRadius:4,flexShrink:0,boxShadow:"3px 4px 12px rgba(0,0,0,.32)"}}/>
              <div style={{flex:1}}>
                {edit
                  ? <input style={{...inp,marginBottom:6,fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}} value={title} onChange={e=>setTitle(e.target.value)}/>
                  : <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:th.text,lineHeight:1.2}}>{book.title}</div>}
                {edit
                  ? <input style={{...inp,marginBottom:4,fontSize:14}} value={author} onChange={e=>setAuthor(e.target.value)}/>
                  : <div style={{fontSize:14,color:th.rust,fontFamily:"'Lato',sans-serif",marginTop:3}}>{book.author}</div>}
                {!edit && <div style={{fontSize:11,color:th.muted,marginTop:3,letterSpacing:.8,fontFamily:"'Lato',sans-serif"}}>{book.genre} · {book.year}</div>}
                {!edit && <span style={{display:"inline-block",marginTop:6,padding:"2px 12px",borderRadius:20,fontSize:11,fontWeight:700,background:book.status==="gelezen"?"#2D5016":book.status==="lezen"?"#8B3A3A":"#5C3A1E",color:"#f4e8d0",fontFamily:"'Lato',sans-serif"}}>{book.status}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>setEdit(!edit)} style={{padding:"5px 11px",background:edit?`linear-gradient(135deg,${th.brown},${th.rust})`:"transparent",color:edit?"#fff":th.rust,border:`1px solid ${th.rust}`,borderRadius:7,cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700}}>{edit?"✓":"✏️"}</button>
              <button onClick={onClose} style={{padding:"5px 9px",background:"transparent",color:th.muted,border:`1px solid ${th.bord}`,borderRadius:7,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
          </div>

          {/* Edit fields */}
          {edit && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              <select style={inp} value={genre} onChange={e=>setGenre(e.target.value)}>
                {["Literatuur","Thriller","Romantiek","Mystery","Poëzie","Klassiek","Non-fictie","Historische roman"].map(g=><option key={g}>{g}</option>)}
              </select>
              <input style={inp} placeholder="Jaar" value={year} onChange={e=>setYear(e.target.value)} type="number"/>
              <input style={inp} placeholder="Pagina's" value={pages} onChange={e=>setPages(e.target.value)} type="number"/>
            </div>
          )}

          {/* Progress */}
          {!edit && book.status==="lezen" && <>

          {/* Rating */}

            </div>
            <label style={{display:"block",fontFamily:"'Playfair Display',serif",fontSize:14,color:th.brown,marginBottom:7,fontStyle:"italic"}}>✦ Favoriete citaat</label>
            <textarea value={quote} onChange={e=>setQuote(e.target.value)} placeholder="Een mooie zin uit dit boek..." style={{width:"100%",padding:"10px 13px",border:`1px solid ${th.bord}`,borderRadius:9,fontFamily:"'Lato',sans-serif",fontSize:14,fontStyle:"italic",background:th.paper,color:th.text,resize:"vertical",minHeight:66,outline:"none",boxSizing:"border-box",lineHeight:1.7,marginBottom:14}}/>
            <label style={{display:"block",fontFamily:"'Playfair Display',serif",fontSize:14,color:th.brown,marginBottom:7,fontStyle:"italic"}}>📝 Mijn recensie</label>
            <textarea value={review} onChange={e=>setReview(e.target.value)} placeholder="Wat vond je van dit boek?" style={{width:"100%",padding:"10px 13px",border:`1px solid ${th.bord}`,borderRadius:9,fontFamily:"'Lato',sans-serif",fontSize:14,background:th.paper,color:th.text,resize:"vertical",minHeight:86,outline:"none",boxSizing:"border-box",lineHeight:1.7,marginBottom:20}}/>
          </>}

          <button onClick={save} style={{width:"100%",padding:13,background:`linear-gradient(135deg,${th.darkbr},${th.brown},${th.rust})`,color:"#FFF8F0",border:"none",borderRadius:11,fontFamily:"'Playfair Display',serif",fontSize:17,cursor:"pointer",letterSpacing:.5,fontWeight:700,boxShadow:`0 4px 18px rgba(0,0,0,.2)`,marginBottom:10}}>Opslaan ✦</button>

          {/* Delete */}
          {!confirm
            ? <button onClick={()=>setConfirm(true)} style={{width:"100%",padding:"9px",background:"transparent",color:"#c04040",border:"1px solid rgba(192,64,64,.3)",borderRadius:9,cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:13}}>🗑️ Verwijderen uit kast</button>
            : <div style={{display:"flex",gap:8,padding:"10px 14px",background:"rgba(192,64,64,.08)",borderRadius:9,border:"1px solid rgba(192,64,64,.25)",alignItems:"center"}}>
                <span style={{flex:1,fontSize:13,color:th.text,fontFamily:"'Lato',sans-serif"}}>Weet je het zeker?</span>
                <button onClick={()=>{onDelete(book.id);onClose();}} style={{padding:"6px 14px",background:"#c04040",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:13,fontWeight:700}}>Ja, verwijder</button>
                <button onClick={()=>setConfirm(false)} style={{padding:"6px 14px",background:"transparent",color:th.muted,border:`1px solid ${th.bord}`,borderRadius:7,cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:13}}>Nee</button>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

function KastTab({ books, setBooks, setSelBook, showToast, th }) {
  const [open, setOpen] = useState(false);
  const [nb, setNb] = useState({title:"",author:"",genre:"Literatuur",pages:"",year:""});
  const gelezen = books.filter(b=>b.status==="gelezen");
  const bezig   = books.filter(b=>b.status==="lezen");

  const inp = {width:"100%",padding:"9px 13px",border:`1px solid ${th.bord}`,borderRadius:8,fontFamily:"'Lato',sans-serif",fontSize:14,background:th.paper,color:th.text,outline:"none",boxSizing:"border-box"};

  const add = () => {
    if (!nb.title||!nb.author) return;
    setBooks(p=>[...p,{id:Date.now(),...nb,pages:parseInt(nb.pages)||200,year:parseInt(nb.year)||2024,color:Math.floor(Math.random()*SC.length),height:132+Math.floor(Math.random()*48),status:"wil lezen",rating:0,read:0,review:"",quote:""}]);

    showToast("📚 Boek toegevoegd aan de kast!");

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>

          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontStyle:"italic",color:th.darkbr,marginBottom:14}}>Nieuw boek toevoegen</div>

            <input style={inp} placeholder="Pagina's" type="number" value={nb.pages} onChange={e=>setNb(p=>({...p,pages:e.target.value}))}/>
            <input style={inp} placeholder="Jaar" type="number" value={nb.year} onChange={e=>setNb(p=>({...p,year:e.target.value}))}/>
            <select style={inp} value={nb.genre} onChange={e=>setNb(p=>({...p,genre:e.target.value}))}>
              {["Literatuur","Thriller","Romantiek","Mystery","Poëzie","Klassiek","Non-fictie","Historische roman"].map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={add} style={{padding:"9px 20px",background:`linear-gradient(135deg,${th.brown},${th.rust})`,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"'Playfair Display',serif",fontSize:14}}>Toevoegen</button>
            <button onClick={()=>setOpen(false)} style={{padding:"9px 20px",background:"transparent",color:th.rust,border:`1.5px solid ${th.rust}`,borderRadius:9,cursor:"pointer",fontFamily:"'Playfair Display',serif",fontSize:14}}>Annuleren</button>
          </div>
        </div>
      )}
      <Bookshelf books={bezig}   onBookClick={setSelBook} label="✦ Nu aan het lezen"  empty="Begin met een boek..." th={th}/>
      <Bookshelf books={gelezen} onBookClick={setSelBook} label="✦ Uitgelezen"         empty="Nog geen boeken uitgelezen..." th={th}/>
      <Bookshelf books={wil}     onBookClick={setSelBook} label="✦ Wil ik lezen"       empty="Voeg boeken toe..." th={th}/>
      <div style={{textAlign:"center",fontSize:12,color:th.muted,fontStyle:"italic",fontFamily:"'Lato',sans-serif"}}>Zweef over een boek om de titel te zien · klik voor details</div>
    </div>
  );
}

/* ─── LOCALSTORAGE HELPERS ─────────────────────────────────────────────── */
function lsLoad(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function lsSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

          </div>
        </div>
        <div style={{display:"flex",overflowX:"auto",maxWidth:980,margin:"0 auto",borderTop:`1px solid ${th.rust}22`}}>
          {TABS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"12px 22px",background:tab===id?"rgba(255,220,100,.12)":"transparent",color:tab===id?"#FFD9A0":"rgba(255,255,255,.52)",border:"none",cursor:"pointer",fontFamily:"'Playfair Display',serif",fontSize:14,letterSpacing:.4,whiteSpace:"nowrap",borderBottom:tab===id?`2px solid ${th.rust}`:"2px solid transparent",transition:"all .18s",fontWeight:tab===id?700:400}}>{lbl}</button>
          ))}
        </div>
      </div>

      {/* MAIN */}
      <div style={{maxWidth:980,margin:"0 auto",padding:"26px 16px 100px"}}>
        {tab==="home"         && <HomeTab books={books} coins={coins} streak={streak} goal={goal} setSelBook={setSelBook} th={th}/>}
        {tab==="kast"         && <KastTab books={books} setBooks={setBooks} setSelBook={setSelBook} showToast={showToast} th={th}/>}
        {tab==="klas"         && <KlasTab books={books} th={th}/>}
        {tab==="instellingen" && <InstellingenTab storeName={storeName} setStoreName={setStoreName} themeId={themeId} setThemeId={setThemeId} goal={goal} setGoal={setGoal} th={th} allThemes={THEMES}/>}
      </div>

      {selBook && <BookModal book={selBook} onClose={()=>setSelBook(null)} onUpdate={b=>{updateBook(b);setSelBook(null);}} onDelete={id=>{deleteBook(id);setSelBook(null);}} th={th}/>}

      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${th.darkbr},${th.brown})`,color:"#FFF0E0",padding:"12px 26px",borderRadius:32,fontSize:14,fontFamily:"'Playfair Display',serif",fontWeight:700,zIndex:999,boxShadow:"0 10px 40px rgba(0,0,0,.4)",animation:"slideUp .3s ease",whiteSpace:"nowrap",letterSpacing:.3}}>
          {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
    }
  </script>
</body>
</html>
